services:
  - type: web
    name: study-room-backend
    env: python
    pythonVersion: "3.11.8"
    rootDir: server
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.8